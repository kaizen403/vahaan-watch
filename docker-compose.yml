name: adarecog

x-workspace-service: &workspace-service
  image: adarecog-workspace:dev
  build:
    context: .
    dockerfile: Dockerfile.workspace
  working_dir: /workspace
  restart: unless-stopped

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adarecog_phase1
    ports:
      - "${ADARECOG_DB_PORT:-5434}:5432"
    volumes:
      - adarecog-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adarecog_phase1"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    <<: *workspace-service
    profiles: ["services"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3003
      API_BASE_URL: http://localhost:3003
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adarecog_phase1?connection_limit=15&pool_timeout=30
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-replace-with-long-random-secret}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3001}
      DEVICE_PROVISIONING_TOKEN: ${DEVICE_PROVISIONING_TOKEN:-dev-provisioning-token-local}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-sibi@sibi.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-sibi}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Sibi}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-sibi}
    command:
      - bash
      - -lc
      - >
        pnpm --filter @adarecog/api run db:deploy &&
        pnpm --filter @adarecog/api run seed:admin &&
        pnpm --filter @adarecog/api run dev
    ports:
      - "3003:3003"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3003/health').then((res) =>
          process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    <<: *workspace-service
    profiles: ["services"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://api:3003
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3003}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3002}
      NODE_ENV: ${NODE_ENV:-development}
    command:
      - bash
      - -lc
      - >
        pnpm --filter @adarecog/web exec next dev -p 3001 --hostname 0.0.0.0
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3001/portal/login',{method:'HEAD'}).then((res) =>
          process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 10s
      retries: 12

  ws-server:
    <<: *workspace-service
    profiles: ["scanner"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      WS_PORT: 3002
      POSTGRES_URL: postgresql://postgres:postgres@db:5432/carmen_anpr
      DB_SCHEMA: public
      BLACKLIST_COLLECTION: blacklisted_plates
      DETECTIONS_COLLECTION: detections
      DB_RETRY_MS: ${DB_RETRY_MS:-5000}
      SEED_DUMMY_BLACKLIST: ${SEED_DUMMY_BLACKLIST:-false}
      WS_ADMIN_TOKEN: ${WS_ADMIN_TOKEN:-}
      VEHICLE_API_KEY: ${VEHICLE_API_KEY:-}
      VEHICLE_API_BASE: ${VEHICLE_API_BASE:-https://ap-southeast-1.api.carmencloud.com/vehicle}
      PLATE_ENCRYPTION_KEY: ${PLATE_ENCRYPTION_KEY:-change_this_to_a_long_secret_key}
    command:
      - bash
      - -lc
      - node apps/ws-server/server.js
    ports:
      - "3002:3002"

volumes:
  adarecog-postgres-data:
